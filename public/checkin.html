<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>签到页面</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
      body { background: #f8fafc; }
      .checkin-wrap { max-width: 520px; margin: 40px auto; padding: 24px; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); }
      .back-link { display: inline-block; margin-bottom: 18px; color: #4f46e5; text-decoration: none; font-weight: 700; }
      .small-note { color: #6b7280; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>
    <main class="container">
      <div class="checkin-wrap">
        <a class="back-link" href="/">← 返回首页</a>
        <h1>签到页面</h1>
        <p class="small-note">请填写姓名并选择团队，签到将自动验证当前位置。</p>
        <form id="checkinForm">
          <div class="field-group"><label>姓名</label><input type="text" id="name" required></div>
          <div class="field-group"><label>团队</label><select id="team" required><option value="运营">运营</option><option value="硬件">硬件</option><option value="软件">软件</option><option value="设计">设计</option></select></div>
          <button class="button-primary" type="submit">签到</button>
        </form>
        <p id="message" class="small-note"></p>
        <p class="small-note" style="margin-top: 20px; color:#d97706;">如果定位失败，请使用 Chrome 或 Safari，并允许浏览器获取位置。</p>
      </div>
    </main>
    <script>
      document.getElementById('checkinForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const team = document.getElementById('team').value;
        const message = document.getElementById('message');
        if (!navigator.geolocation) {
          message.textContent = '浏览器不支持定位，请换一个支持定位的浏览器。';
          return;
        }
        message.textContent = '正在获取定位，请允许浏览器访问位置...';
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const response = await fetch('/api/checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, team, lat, lng })
          });
          const result = await response.json();
          message.textContent = result.success ? '签到成功 🎉' : `签到失败：${result.message}`;
        }, () => { message.textContent = '无法获取定位，请允许定位权限。'; });
      });
    </script>
</body>
</html>
